[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NPM_CONFIG_OPTIONAL = "true"
  NPM_FLAGS = "--no-audit --no-fund"
  NODE_VERSION = "22.15.0"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Enforce trailing slashes (301 redirect)
[[redirects]]
  from = "/personal-training"
  to = "/personal-training/"
  status = 301

[[redirects]]
  from = "/pakketten"
  to = "/"
  status = 301

[[redirects]]
  from = "/pakketten/"
  to = "/"
  status = 301

