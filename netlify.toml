[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NPM_CONFIG_OPTIONAL = "true"
  NPM_FLAGS = "--no-audit --no-fund"
  NODE_VERSION = "22.15.0"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
